<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wire Knot</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000000;
    overflow: hidden;
    cursor: none;
  }
  canvas { display: block; position: fixed; inset: 0; }
  #logo {
    position: fixed;
    top: 1.8rem;
    left: 2rem;
    width: 320px;
    z-index: 30;
    pointer-events: none;
  }

  #cursor {
    position: fixed;
    width: 6px; height: 6px;
    background: #f0eeeb;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 999;
    transition: width 0.25s, height 0.25s, border-radius 0.25s, background 0.25s;
  }
  #cursor.hover {
    width: 32px; height: 32px;
    background: transparent;
    border: 1px solid #f0eeeb;
  }

  /* ── Labels overlay ─────────────────────────────────────────────── */
  #labels {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 10;
  }



  /* ── Bottom panel ────────────────────────────────────────────────── */
  #panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 2rem 3.5rem 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 2rem;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0));
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
    z-index: 20;
  }
  #panel.show {
    opacity: 1;
    transform: none;
    pointer-events: auto;
  }
  #panel-left { display: flex; flex-direction: column; gap: 0.5rem; }
  #panel-tag {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.48rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #888480;
  }
  #panel-desc {
    font-family: 'EB Garamond', serif;
    font-size: 1.15rem;
    color: #f0eeeb;
    line-height: 1.7;
    font-style: italic;
    max-width: 380px;
  }
  #panel-cta {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: #f0eeeb;
    border-bottom: 1px solid #f0eeeb;
    padding-bottom: 2px;
    white-space: nowrap;
    align-self: flex-end;
    cursor: none;
    transition: opacity 0.3s;
  }
  #panel-cta:hover { opacity: 0.5; }


    50% { transform: scaleY(1.3); opacity: 1; }
  }


  /* ── Contact section ────────────────────────────────────────────── */
  #contact {
    position: relative;
    z-index: 20;
    margin-top: 100vh;
    padding: 7rem 3.5rem 5rem;
    border-top: 1px solid rgba(255,255,255,0.07);
    background: #000;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 4rem;
  }
  #contact-left {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    max-width: 420px;
  }
  #contact-eyebrow {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.44rem;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  #contact-heading {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 400;
    color: #f0eeeb;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }
  #contact-heading em {
    font-style: italic;
    color: rgba(240,238,235,0.5);
  }
  #contact-body {
    font-family: 'EB Garamond', serif;
    font-size: 1.05rem;
    color: rgba(240,238,235,0.45);
    line-height: 1.75;
    font-style: italic;
  }
  #contact-right {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    padding-top: 0.5rem;
    min-width: 220px;
  }
  .contact-item {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .contact-item-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.4rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
  .contact-item-value {
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    color: rgba(240,238,235,0.75);
    text-decoration: none;
    border-bottom: 1px solid rgba(240,238,235,0.12);
    padding-bottom: 3px;
    transition: color 0.3s, border-color 0.3s;
    cursor: none;
  }
  .contact-item-value:hover {
    color: #f0eeeb;
    border-color: rgba(240,238,235,0.5);
  }
  #contact-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
    padding: 1.4rem 3rem;
    background: transparent;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  #contact-footer span {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
  }
  #scroll-hint {
    position: fixed;
    bottom: 2.2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.44rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    opacity: 0;
    animation: fadeIn 1s 2.5s forwards;
    pointer-events: none;
    z-index: 30;
    transition: opacity 0.5s;
  }
  #scroll-hint .arrow {
    width: 1px;
    height: 24px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.25));
    animation: arrowPulse 2s ease-in-out infinite;
  }
  @keyframes arrowPulse {
    0%, 100% { opacity: 0.4; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(4px); }
  }


  /* ── Nav menu ───────────────────────────────────────────────────── */
  #nav {
    position: fixed;
    top: 2rem;
    right: 3rem;
    display: flex;
    align-items: center;
    gap: 2.4rem;
    z-index: 30;
  }
  .nav-item {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.69rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(240,238,235,0.5);
    text-decoration: none;
    cursor: none;
    transition: color 0.3s;
    position: relative;
  }
  .nav-item::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 0;
    width: 0;
    height: 1px;
    background: rgba(240,238,235,0.6);
    transition: width 0.35s ease;
  }
  .nav-item:hover {
    color: rgba(240,238,235,0.95);
  }
  .nav-item:hover::after {
    width: 100%;
  }


  /* ── Mobile responsive ──────────────────────────────────────────── */
  @media (max-width: 768px) {

    /* Hide custom cursor on touch devices */
    #cursor { display: none; }
    html, body { cursor: auto; }
    .nav-item, #panel-cta, .contact-item-value { cursor: pointer; }

    /* Logo — smaller on mobile */
    #logo {
      width: 180px;
      top: 1.2rem;
      left: 1.2rem;
    }

    /* Nav — smaller, tighter */
    #nav {
      top: 1.4rem;
      right: 1.2rem;
      gap: 1.4rem;
    }
    .nav-item {
      font-size: 0.55rem;
      letter-spacing: 0.14em;
    }

    /* Footer — stack on very small screens */
    #contact-footer {
      padding: 1rem 1.2rem;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
    }
    #contact-footer a,
    #contact-footer span {
      font-size: 0.45rem;
      letter-spacing: 0.16em;
    }
  }

  @media (max-width: 480px) {
    #logo {
      width: 140px;
      top: 1rem;
      left: 1rem;
    }
    #nav {
      top: 1.1rem;
      right: 1rem;
      gap: 1rem;
    }
    .nav-item {
      font-size: 0.5rem;
    }
  }

</style>
</head>

<div id="cursor"></div>
<nav id="nav">
  <a class="nav-item" href="#">About</a>
  <a class="nav-item" href="#contact">Contact</a>
</nav>

<script>
// ══════════════════════════════════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ══════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);

// ══════════════════════════════════════════════════════════════════════
//  MOUSE / CURSOR
// ══════════════════════════════════════════════════════════════════════
const cursorEl = document.getElementById('cursor');
const mouse    = { x: 0, y: 0 };
const rotTarget  = { x: 0, y: 0 };
const rotCurrent = { x: 0, y: 0 };
let lastMouseMove = 0;

document.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  lastMouseMove = Date.now();
});

// ══════════════════════════════════════════════════════════════════════
//  FACES — 6 sides of the cube
// ══════════════════════════════════════════════════════════════════════
const CUBE_R = 0.88; // radius used for label projection

const faces = [
  { normal: new THREE.Vector3( 0,  0,  1), tag: '01 — About',   title: 'Justin <em>Baggio</em>',    desc: 'Director and visual artist working at the edge of image and sensation.',     cta: 'Read more',        anchor: { x: 0.50, y: 0.18 } },
  { normal: new THREE.Vector3( 0,  0, -1), tag: '02 — Works',   title: '<em>Selected</em> Works',   desc: 'Films, installations, and moving-image experiments across a decade.',       cta: 'Browse catalogue', anchor: { x: 0.50, y: 0.82 } },
  { normal: new THREE.Vector3( 1,  0,  0), tag: '03 — Journal', title: 'Studio <em>Journal</em>',   desc: 'Ongoing reflections on practice, process, and the experience of place.',    cta: 'Open journal',     anchor: { x: 0.82, y: 0.50 } },
  { normal: new THREE.Vector3(-1,  0,  0), tag: '04 — Contact', title: 'Get in <em>Touch</em>',     desc: 'Commissions, collaborative projects, and general enquiries welcome.',        cta: 'Say hello',        anchor: { x: 0.18, y: 0.50 } },
  { normal: new THREE.Vector3( 0,  1,  0), tag: '',             title: '',                           desc: '',                                                                         cta: '',                 anchor: { x: 0.82, y: 0.24 } },
  { normal: new THREE.Vector3( 0, -1,  0), tag: '',             title: '',                           desc: '',                                                                         cta: '',                 anchor: { x: 0.18, y: 0.76 } },
];

// DOM labels
const labelsEl = document.getElementById('labels');
const labelEls = faces.map((f, i) => {
  const div = document.createElement('div');
  div.className = 'face-label';
  div.innerHTML = `<span class="label-tag">${f.tag}</span><span class="label-title">${f.title}</span><span class="label-line"></span>`;
  labelsEl.appendChild(div);
  return div;
});

// Panel
const panel     = document.getElementById('panel');
const panelTag  = document.getElementById('panel-tag');
const panelDesc = document.getElementById('panel-desc');
const panelCta  = document.getElementById('panel-cta');
let panelTimeout;

function showPanel(i) {
  clearTimeout(panelTimeout);
  panelTag.textContent  = faces[i].tag;
  panelDesc.innerHTML   = faces[i].desc;
  panelCta.textContent  = faces[i].cta + '  →';
  panel.classList.add('show');
}
function hidePanel() {
  panelTimeout = setTimeout(() => panel.classList.remove('show'), 200);
}

labelEls.forEach((el, i) => {
  el.addEventListener('mouseenter', () => { cursorEl.classList.add('hover'); showPanel(i); });
  el.addEventListener('mouseleave', () => { cursorEl.classList.remove('hover'); hidePanel(); });
});
panelCta.addEventListener('mouseenter', () => cursorEl.classList.add('hover'));
panelCta.addEventListener('mouseleave', () => cursorEl.classList.remove('hover'));

// ══════════════════════════════════════════════════════════════════════
//  WIRE GEOMETRY
// ══════════════════════════════════════════════════════════════════════
const group = new THREE.Group();
scene.add(group);

const inks = [0xd4d0cb, 0xe8e4de, 0xbcb8b2, 0xf0eeeb, 0xc8c4be];
const rInk = () => inks[Math.floor(Math.random() * inks.length)];
const rLine = (pts, op) => {
  const g = new THREE.BufferGeometry().setFromPoints(pts);
  const m = new THREE.LineBasicMaterial({ color: rInk(), transparent: true, opacity: op });
  return new THREE.Line(g, m);
};

// Straight wires — now with depth offset for 3D parallax feel
for (let i = 0; i < 18; i++) {
  const pts = [];
  const a = Math.random() * Math.PI;
  const dx = Math.cos(a), dy = Math.sin(a) * 0.25;
  // Give each wire a strong z-depth offset so they span real 3D space
  const zStart = (Math.random() - 0.5) * 2.4;
  const zEnd   = (Math.random() - 0.5) * 2.4;
  const len = 3.5 + Math.random() * 1.5;
  const sp  = 0.08 + Math.random() * 0.06;
  for (let j = 0; j <= 100; j++) {
    const t = (j / 100) * 2 - 1;
    const tN = (j / 100); // 0..1
    const w = Math.sin(t * Math.PI * (2 + Math.random() * 3)) * sp * 0.3;
    // Interpolate z from zStart to zEnd so wire travels through depth
    const z = zStart + (zEnd - zStart) * tN + (Math.random() - 0.5) * sp * 0.4;
    pts.push(new THREE.Vector3(dx * t * len + w * dy, dy * t * len + w * dx, z));
  }
  group.add(rLine(pts, 0.35 + Math.random() * 0.5));
}

// Cube-edge wires — explicit 3D box edges with slight wobble
(function addCubeEdges() {
  const S = 0.88; // cube half-size matches CUBE_R
  const corners = [
    [-S,-S,-S],[S,-S,-S],[S,S,-S],[-S,S,-S],
    [-S,-S, S],[S,-S, S],[S,S, S],[-S,S, S]
  ];
  const edges = [
    [0,1],[1,2],[2,3],[3,0], // back face
    [4,5],[5,6],[6,7],[7,4], // front face
    [0,4],[1,5],[2,6],[3,7]  // connecting edges
  ];
  edges.forEach(([a,b]) => {
    const pts = [];
    const ca = corners[a], cb = corners[b];
    const wobble = 0.025 + Math.random() * 0.03;
    const segs = 60;
    for (let j = 0; j <= segs; j++) {
      const t = j / segs;
      const nx = ca[0] + (cb[0]-ca[0])*t + (Math.random()-0.5)*wobble;
      const ny = ca[1] + (cb[1]-ca[1])*t + (Math.random()-0.5)*wobble;
      const nz = ca[2] + (cb[2]-ca[2])*t + (Math.random()-0.5)*wobble;
      pts.push(new THREE.Vector3(nx, ny, nz));
    }
    group.add(rLine(pts, 0.55 + Math.random() * 0.35));
  });
})();

// Cube-snapped knot wires
function snapCube(x, y, z, s, soft) {
  const m = Math.max(Math.abs(x), Math.abs(y), Math.abs(z));
  const sc = s / (m + 1e-4);
  return new THREE.Vector3(x + (x * sc - x) * (1 - soft), y + (y * sc - y) * (1 - soft), z + (z * sc - z) * (1 - soft));
}

for (let i = 0; i < 36; i++) {
  const pts = [];
  const S    = 0.72 + Math.random() * 0.2;
  const soft = 0.1  + Math.random() * 0.2;
  const loops = 2 + Math.floor(Math.random() * 4);
  const ph   = (i / 36) * Math.PI * 2;
  const wa   = 0.05 + Math.random() * 0.08;
  const ax   = i % 3;
  const ef   = 1 + Math.floor(Math.random() * 2);
  for (let j = 0; j <= 280; j++) {
    const t  = (j / 280) * Math.PI * 2 * loops + ph;
    const t2 = (j / 280) * Math.PI * 2 + ph * 0.7;
    let x, y, z;
    if      (ax === 0) { x = Math.cos(t)*(1+.35*Math.cos(t2*1.5)); y = Math.sin(t)*(1+.35*Math.sin(t2*2.3)); z = Math.sin(t2*ef)*.9; }
    else if (ax === 1) { x = Math.sin(t2*ef)*.9; y = Math.cos(t)*(1+.35*Math.cos(t2*1.7)); z = Math.sin(t)*(1+.35*Math.sin(t2*2.1)); }
    else               { x = Math.cos(t)*(1+.35*Math.cos(t2*2.0)); y = Math.sin(t2*ef)*.9; z = Math.sin(t)*(1+.35*Math.sin(t2*1.4)); }
    x += (Math.random()-.5)*wa; y += (Math.random()-.5)*wa; z += (Math.random()-.5)*wa;
    pts.push(snapCube(x, y, z, S, soft));
  }
  group.add(rLine(pts, 0.28 + Math.random() * 0.6));
}

// Loose emanating wires
for (let i = 0; i < 10; i++) {
  const pts = [];
  const sa  = (i / 10) * Math.PI * 2;
  const ls  = 0.6 + Math.random() * 0.5;
  for (let j = 0; j <= 120; j++) {
    const t = j / 120;
    const g = t * 2.5;
    const lp = Math.sin(t * Math.PI * (2 + Math.random() * 2)) * ls * (1 - t * 0.5);
    pts.push(new THREE.Vector3(Math.cos(sa)*g + lp*Math.sin(sa), Math.sin(sa)*g*.3 + lp*Math.cos(sa)*.3, (Math.random()-.5)*.4*t));
  }
  group.add(rLine(pts, 0.22 + Math.random() * 0.38));
}


// ══════════════════════════════════════════════════════════════════════
//  PIXEL DOTS — square particles that move with the cube rotation
// ══════════════════════════════════════════════════════════════════════
const dotGroup = new THREE.Group();
scene.add(dotGroup);

const DOT_COUNT = 360;
const dotData = []; // store per-dot state for animation

const dotGeo = new THREE.PlaneGeometry(1, 1);

for (let i = 0; i < DOT_COUNT; i++) {
  // Random size: small squares like pixel art — 0.018 to 0.055
  const size = 0.018 + Math.random() * 0.037;

  const mat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.08 + Math.random() * 0.38,
    side: THREE.DoubleSide,
  });

  const mesh = new THREE.Mesh(dotGeo, mat);
  mesh.scale.setScalar(size);

  // Scatter in a wide sphere around the cube
  const r     = 1.4 + Math.random() * 3.2;
  const theta = Math.acos(2 * Math.random() - 1);
  const phi   = Math.random() * Math.PI * 2;
  const x = r * Math.sin(theta) * Math.cos(phi);
  const y = r * Math.sin(theta) * Math.sin(phi);
  const z = r * Math.cos(theta);

  mesh.position.set(x, y, z);

  // Each dot gets individual drift speeds
  dotData.push({
    mesh,
    baseX: x, baseY: y, baseZ: z,
    driftSpeed: 0.15 + Math.random() * 0.35,
    driftAmp:   0.04 + Math.random() * 0.10,
    phase:      Math.random() * Math.PI * 2,
    phaseY:     Math.random() * Math.PI * 2,
    // Flicker
    flickerSpeed: 0.8 + Math.random() * 2.5,
    flickerPhase: Math.random() * Math.PI * 2,
    baseOpacity:  0.08 + Math.random() * 0.38,
  });

  dotGroup.add(mesh);
}

// Keep dotGroup rotation in sync with main group
function syncDots() {
  dotGroup.rotation.copy(group.rotation);
  dotGroup.scale.copy(group.scale);
}

// ══════════════════════════════════════════════════════════════════════
//  LABEL PROJECTION
// ══════════════════════════════════════════════════════════════════════
const _v = new THREE.Vector3();

function projectFaceCenter(normal) {
  _v.copy(normal).multiplyScalar(CUBE_R * 1.22).applyEuler(group.rotation);
  const ndc = _v.clone().project(camera);
  return {
    x: ( ndc.x * 0.5 + 0.5) * window.innerWidth,
    y: (-ndc.y * 0.5 + 0.5) * window.innerHeight,
  };
}

function faceDot(normal) {
  // dot of world-normal with camera look direction (0,0,-1)
  const wn = normal.clone().applyEuler(group.rotation).normalize();
  return wn.z; // camera looks at -Z so worldNormal.dot(cameraDir) = -wn.z; visible when < 0
}

// ══════════════════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ══════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let idleT = 0;
const lerp = (a, b, t) => a + (b - a) * t;

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();

  rotTarget.y =  mouse.x * Math.PI * 0.72;
  rotTarget.x = -mouse.y * Math.PI * 0.42;
  rotCurrent.x = lerp(rotCurrent.x, rotTarget.x, 0.04);
  rotCurrent.y = lerp(rotCurrent.y, rotTarget.y, 0.04);

  const idle = Date.now() - lastMouseMove > 3000;
  if (idle) {
    idleT += 0.003;
    group.rotation.y = rotCurrent.y + idleT;
    group.rotation.x = rotCurrent.x + Math.sin(idleT * 0.4) * 0.15;
  } else {
    idleT = group.rotation.y - rotCurrent.y;
    group.rotation.y = rotCurrent.y + idleT * 0.95;
    group.rotation.x = rotCurrent.x;
  }
  group.rotation.z = Math.sin(elapsed * 0.2) * 0.04;
  group.scale.setScalar(1 + Math.sin(elapsed * 0.5) * 0.012);

  // Update labels — fixed positions, always visible, dim when back-facing
  faces.forEach((face, i) => {
    const el  = labelEls[i];
    const dot = faceDot(face.normal); // negative = facing camera

    // Fixed anchor position on screen
    el.style.left = (face.anchor.x * window.innerWidth)  + 'px';
    el.style.top  = (face.anchor.y * window.innerHeight) + 'px';

    // Always visible: front-facing = full, back-facing = muted
    const facing = -dot; // 1 = fully facing, -1 = fully away
    const opacity = 0.22 + Math.max(0, facing) * 0.78;
    el.style.opacity = opacity.toFixed(3);
    el.style.pointerEvents = 'auto';
    el.classList.add('hoverable');
  });

  // Animate pixel dots
  const t = elapsed;
  dotData.forEach(d => {
    d.mesh.position.x = d.baseX + Math.sin(t * d.driftSpeed + d.phase)  * d.driftAmp;
    d.mesh.position.y = d.baseY + Math.cos(t * d.driftSpeed + d.phaseY) * d.driftAmp;
    d.mesh.position.z = d.baseZ + Math.sin(t * d.driftSpeed * 0.7 + d.phase + 1.2) * d.driftAmp * 0.6;
    // Gentle flicker
    const flicker = 0.7 + 0.3 * Math.sin(t * d.flickerSpeed + d.flickerPhase);
    d.mesh.material.opacity = d.baseOpacity * flicker;
    // Always face camera
    d.mesh.quaternion.copy(camera.quaternion);
  });
  syncDots();

  renderer.render(scene, camera);
}
animate();

// ══════════════════════════════════════════════════════════════════════
//  RESIZE
// ══════════════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ══════════════════════════════════════════════════════════════════════
//  SCROLL INTERACTION
// ══════════════════════════════════════════════════════════════════════
const videoSection = document.getElementById('video-section');
const scrollHint   = document.getElementById('scroll-hint');
let scrollProgress = 0;

window.addEventListener('scroll', () => {
  const maxScroll = document.body.scrollHeight - window.innerHeight;
  scrollProgress = Math.min(window.scrollY / maxScroll, 1);

  // Fade out scroll hint immediately
  scrollHint.style.opacity = scrollProgress > 0.02 ? '0' : '';

  // Fade cube/wires out over first 60% of scroll
  const cubeOpacity = Math.max(0, 1 - scrollProgress / 0.6);
  document.getElementById('scene-wrap').style.opacity = cubeOpacity;

  // Fade video in from 40% scroll onward
  const videoOpacity = Math.max(0, (scrollProgress - 0.4) / 0.4);
  videoSection.style.opacity = videoOpacity;
  videoSection.style.pointerEvents = videoOpacity > 0.1 ? 'auto' : 'none';

  // Subtle scale-up on video as it appears
  const videoScale = 0.92 + videoOpacity * 0.08;
  const vEl = videoSection.querySelector('video') || videoSection.querySelector('#video-placeholder'); if(vEl) vEl.style.transform = `scale(${videoScale})`;
});

</script>
